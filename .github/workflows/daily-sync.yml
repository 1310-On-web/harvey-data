name: Daily Harvey Usage Sync

on:
  schedule:
    # GitHub cron is UTC; IST = UTC+5:30. Five runs/day for retry coverage if one fails.
    - cron: "30 20 * * *" # 2:00 AM IST
    - cron: "30 22 * * *" # 4:00 AM IST
    - cron: "30 0 * * *"  # 6:00 AM IST
    - cron: "30 8 * * *"  # 2:00 PM IST
    - cron: "30 15 * * *" # 9:00 PM IST
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync Harvey usage to Supabase
        env:
          HARVEY_TOKEN: ${{ secrets.HARVEY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python harvey_usage_sync.py
